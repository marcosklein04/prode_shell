services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: prode_shell
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - DB_HOST=db
      - DB_NAME=prode_shell
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_PORT=5432
      - DJANGO_SECRET_KEY=dev-secret-key-solo-para-desarrollo
      - DJANGO_DEBUG=True
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - db

volumes:
  postgres_data:
